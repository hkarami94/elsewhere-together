<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elsewhere, Together — Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      padding: 48px 40px 32px;
      border-bottom: 1px solid #1a1a1a;
    }

    header h1 {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(20px, 2.5vw, 36px);
      font-weight: normal;
      letter-spacing: 1px;
      color: #FFE000;
      text-transform: none;
    }

    header h1 span { color: #555; font-family: 'Courier New', Courier, monospace; font-size: 0.55em; letter-spacing: 2px; text-transform: uppercase; }

    header p {
      font-size: 12px;
      color: #333;
      letter-spacing: 1px;
    }

    #slideshow-btn {
      background: none;
      border: 1px solid #333;
      color: #666;
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 2px;
      padding: 8px 20px;
      cursor: pointer;
      text-transform: uppercase;
      transition: border-color .2s, color .2s;
    }

    #slideshow-btn:hover { border-color: #888; color: #fff; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 3px;
      padding: 3px;
    }

    .artwork {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #0a0a0a;
      overflow: hidden;
      cursor: pointer;
    }

    .artwork img {
      width: 100%; height: 100%;
      object-fit: contain;
      transition: transform .4s ease;
    }

    .artwork:hover img { transform: scale(1.03); }

    .artwork .meta {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 14px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,.85));
      font-size: 11px;
      color: #555;
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity .2s;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .artwork:hover .meta { opacity: 1; }

    .dl-btn {
      background: none;
      border: 1px solid #555;
      color: #aaa;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 4px 10px;
      cursor: pointer;
      text-transform: uppercase;
      transition: border-color .2s, color .2s;
      flex-shrink: 0;
    }
    .dl-btn:hover { border-color: #fff; color: #fff; }

    #lb-download {
      background: none;
      border: 1px solid #333;
      color: #555;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 5px 14px;
      cursor: pointer;
      text-transform: uppercase;
      transition: border-color .2s, color .2s;
    }
    #lb-download:hover { border-color: #888; color: #fff; }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 120px 40px;
      color: #222;
      font-size: 14px;
      letter-spacing: 2px;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.96);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #lightbox.open { display: flex; }

    #lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      transition: opacity .3s;
    }

    #lightbox-img.fade { opacity: 0; }

    /* progress bar for slideshow */
    #slideshow-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: #fff;
      width: 0%;
      transition: width linear;
      display: none;
    }

    #lightbox.slideshow #slideshow-bar { display: block; }

    /* nav arrows */
    .lb-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,.3);
      font-size: 48px;
      cursor: pointer;
      padding: 20px;
      line-height: 1;
      transition: color .2s;
      user-select: none;
    }

    .lb-arrow:hover { color: rgba(255,255,255,.9); }
    #lb-prev { left: 10px; }
    #lb-next { right: 10px; }

    /* close + counter */
    #lb-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px;
    }

    #lb-counter { font-size: 12px; color: #444; letter-spacing: 2px; }
    #lb-close { font-size: 22px; color: #444; cursor: pointer; }
    #lb-close:hover { color: #fff; }

    #lb-slideshow-toggle {
      background: none;
      border: 1px solid #333;
      color: #555;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 5px 14px;
      cursor: pointer;
      text-transform: uppercase;
      transition: border-color .2s, color .2s;
    }

    #lb-slideshow-toggle:hover,
    #lb-slideshow-toggle.active { border-color: #888; color: #fff; }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Elsewhere, Together <span>— Gallery</span></h1>
      <p style="margin-top:10px">Drawings made together by two strangers &nbsp;·&nbsp; <span id="count">loading…</span></p>
    </div>
    <button id="slideshow-btn">▶ Slideshow</button>
  </header>

  <div class="grid" id="grid"></div>

  <footer style="padding:48px 40px;border-top:1px solid #1a1a1a;display:flex;gap:32px;font-size:12px;letter-spacing:1px;color:#444;">
    <a href="mailto:hamed.karami@stud.h-da.de" style="color:#444;text-decoration:none;transition:color .2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#444'">hamed.karami@stud.h-da.de</a>
    <a href="https://instagram.com/nutsinmotion" target="_blank" rel="noopener" style="color:#444;text-decoration:none;transition:color .2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#444'">@nutsinmotion</a>
  </footer>

  <!-- Lightbox -->
  <div id="lightbox">
    <div id="slideshow-bar"></div>
    <div id="lb-top">
      <span id="lb-counter"></span>
      <div style="display:flex;gap:12px;align-items:center">
        <button id="lb-download">↓ Download</button>
        <button id="lb-slideshow-toggle">▶ Play</button>
        <span id="lb-close">✕</span>
      </div>
    </div>
    <img id="lightbox-img" src="" alt="">
    <button class="lb-arrow" id="lb-prev">‹</button>
    <button class="lb-arrow" id="lb-next">›</button>
  </div>

  <script>
    function downloadImage(url, filename) {
      fetch(url)
        .then(r => r.blob())
        .then(blob => {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = filename || 'artwork.png';
          a.click();
          URL.revokeObjectURL(a.href);
        });
    }

    let items = [];
    let currentIndex = 0;
    let slideshowTimer = null;
    const SLIDE_INTERVAL = 5000;

    const lightbox   = document.getElementById('lightbox');
    const lbImg      = document.getElementById('lightbox-img');
    const lbCounter  = document.getElementById('lb-counter');
    const lbBar      = document.getElementById('slideshow-bar');
    const lbToggle   = document.getElementById('lb-slideshow-toggle');

    // ── Load images ──────────────────────────────────────────────
    fetch('/gallery-data')
      .then(r => r.json())
      .then(data => {
        items = data;
        document.getElementById('count').textContent =
          items.length === 0 ? 'no artworks yet'
          : items.length === 1 ? '1 artwork'
          : `${items.length} artworks`;

        const grid = document.getElementById('grid');

        if (!items.length) {
          grid.innerHTML = '<div class="empty">No artworks yet.<br>Sessions will appear here after they complete.</div>';
          document.getElementById('slideshow-btn').style.display = 'none';
          return;
        }

        items.forEach((item, i) => {
          const ts   = parseInt(item.name);
          const date = isNaN(ts) ? '' : new Date(ts).toLocaleDateString('en-GB', {
            day: 'numeric', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });

          const div = document.createElement('div');
          div.className = 'artwork';
          div.innerHTML = `
            <img src="${item.url}" loading="lazy" alt="Artwork">
            <div class="meta">
              <span>${date}</span>
              <button class="dl-btn" data-url="${item.url}" data-name="${item.name}">↓ Save</button>
            </div>
          `;
          div.querySelector('.dl-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            downloadImage(item.url, item.name);
          });
          div.addEventListener('click', () => openLightbox(i));
          grid.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById('grid').innerHTML =
          '<div class="empty">Could not load gallery.</div>';
      });

    // ── Lightbox ─────────────────────────────────────────────────
    function openLightbox(index) {
      currentIndex = index;
      showImage(currentIndex);
      lightbox.classList.add('open');
    }

    function showImage(index, fade = false) {
      currentIndex = (index + items.length) % items.length;
      lbCounter.textContent = `${currentIndex + 1} / ${items.length}`;

      if (fade) {
        lbImg.classList.add('fade');
        setTimeout(() => {
          lbImg.src = items[currentIndex].url;
          lbImg.classList.remove('fade');
        }, 300);
      } else {
        lbImg.src = items[currentIndex].url;
      }
    }

    function closeLightbox() {
      stopSlideshow();
      lightbox.classList.remove('open');
    }

    // ── Slideshow ─────────────────────────────────────────────────
    function startSlideshow() {
      lightbox.classList.add('slideshow');
      lbToggle.textContent = '■ Stop';
      lbToggle.classList.add('active');

      lbBar.style.transition = 'none';
      lbBar.style.width = '0%';
      requestAnimationFrame(() => {
        lbBar.style.transition = `width ${SLIDE_INTERVAL}ms linear`;
        lbBar.style.width = '100%';
      });

      slideshowTimer = setInterval(() => {
        showImage(currentIndex + 1, true);
        lbBar.style.transition = 'none';
        lbBar.style.width = '0%';
        requestAnimationFrame(() => {
          lbBar.style.transition = `width ${SLIDE_INTERVAL}ms linear`;
          lbBar.style.width = '100%';
        });
      }, SLIDE_INTERVAL);
    }

    function stopSlideshow() {
      clearInterval(slideshowTimer);
      slideshowTimer = null;
      lightbox.classList.remove('slideshow');
      lbToggle.textContent = '▶ Play';
      lbToggle.classList.remove('active');
    }

    function toggleSlideshow() {
      if (slideshowTimer) stopSlideshow();
      else startSlideshow();
    }

    // ── Events ────────────────────────────────────────────────────
    document.getElementById('slideshow-btn').addEventListener('click', () => {
      if (!items.length) return;
      openLightbox(0);
      startSlideshow();
    });

    document.getElementById('lb-download').addEventListener('click', (e) => {
      e.stopPropagation();
      const item = items[currentIndex];
      if (item) downloadImage(item.url, item.name);
    });
    lbToggle.addEventListener('click', (e) => { e.stopPropagation(); toggleSlideshow(); });
    document.getElementById('lb-close').addEventListener('click', (e) => { e.stopPropagation(); closeLightbox(); });
    document.getElementById('lb-prev').addEventListener('click', (e) => { e.stopPropagation(); stopSlideshow(); showImage(currentIndex - 1, true); });
    document.getElementById('lb-next').addEventListener('click', (e) => { e.stopPropagation(); stopSlideshow(); showImage(currentIndex + 1, true); });

    lightbox.addEventListener('click', closeLightbox);
    lbImg.addEventListener('click', e => e.stopPropagation());

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowRight')  { stopSlideshow(); showImage(currentIndex + 1, true); }
      if (e.key === 'ArrowLeft')   { stopSlideshow(); showImage(currentIndex - 1, true); }
      if (e.key === ' ')           { e.preventDefault(); toggleSlideshow(); }
    });
  </script>
</body>
</html>
