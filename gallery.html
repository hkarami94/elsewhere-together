<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elsewhere, Together — Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
    }

    header {
      padding: 48px 40px 32px;
      border-bottom: 1px solid #1a1a1a;
    }

    header h1 {
      font-size: clamp(18px, 3vw, 28px);
      font-weight: normal;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    header h1 span {
      color: #444;
    }

    header p {
      margin-top: 10px;
      font-size: 12px;
      color: #333;
      letter-spacing: 1px;
    }

    #count {
      color: #555;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 3px;
      padding: 3px;
    }

    .artwork {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #0a0a0a;
      overflow: hidden;
      cursor: pointer;
    }

    .artwork img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform .4s ease;
    }

    .artwork:hover img {
      transform: scale(1.03);
    }

    .artwork .meta {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 14px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,.85));
      font-size: 11px;
      color: #555;
      letter-spacing: 1px;
      opacity: 0;
      transition: opacity .2s;
    }

    .artwork:hover .meta {
      opacity: 1;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 120px 40px;
      color: #222;
      font-size: 14px;
      letter-spacing: 2px;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.95);
      z-index: 999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
    }

    #lightbox-close {
      position: fixed;
      top: 20px; right: 28px;
      font-size: 28px;
      color: #444;
      cursor: pointer;
      line-height: 1;
    }

    #lightbox-close:hover { color: #fff; }
  </style>
</head>
<body>

  <header>
    <h1>Elsewhere, Together <span>— Gallery</span></h1>
    <p>Drawings made together by two strangers in different cities &nbsp;·&nbsp; <span id="count">loading…</span></p>
  </header>

  <div class="grid" id="grid"></div>

  <div id="lightbox">
    <div id="lightbox-close">✕</div>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    const grid = document.getElementById('grid');
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');

    fetch('/gallery-data')
      .then(r => r.json())
      .then(items => {
        document.getElementById('count').textContent =
          items.length === 0 ? 'no artworks yet'
          : items.length === 1 ? '1 artwork'
          : `${items.length} artworks`;

        if (!items.length) {
          grid.innerHTML = '<div class="empty">No artworks yet.<br>Sessions will appear here after they complete.</div>';
          return;
        }

        items.forEach(item => {
          const ts = parseInt(item.name);
          const date = isNaN(ts) ? '' : new Date(ts).toLocaleDateString('en-GB', {
            day: 'numeric', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });

          const div = document.createElement('div');
          div.className = 'artwork';
          div.innerHTML = `
            <img src="${item.url}" loading="lazy" alt="Artwork">
            <div class="meta">${date}</div>
          `;
          div.addEventListener('click', () => {
            lbImg.src = item.url;
            lightbox.classList.add('open');
          });
          grid.appendChild(div);
        });
      })
      .catch(() => {
        grid.innerHTML = '<div class="empty">Could not load gallery.</div>';
      });

    lightbox.addEventListener('click', () => lightbox.classList.remove('open'));
    document.getElementById('lightbox-close').addEventListener('click', () => lightbox.classList.remove('open'));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });
  </script>
</body>
</html>
